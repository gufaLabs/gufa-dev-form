<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gufa.Labs — Which film?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Noto+Serif+Devanagari:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0908;
      --amber:     #c8922a;
      --amber-dim: #7a5518;
      --amber-glow:#c8922a33;
      --text:      #e8dcc8;
      --text-dim:  #7a6e60;
      --surface:   #131110;
      --border:    #2a2420;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'IM Fell English', Georgia, serif;
      overflow: hidden;
    }

    /* ── grain overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 180px;
      opacity: 0.55;
      pointer-events: none;
      z-index: 0;
    }

    /* ── amber vignette ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 60%, transparent 30%, #0a090888 80%, #0a0908ee 100%);
      pointer-events: none;
      z-index: 0;
    }

    .stage {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* ── eyebrow ── */
    .eyebrow {
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      color: var(--amber-dim);
      text-transform: lowercase;
      margin-bottom: 2.4rem;
      opacity: 0.8;
    }

    /* ── headline ── */
    .headline {
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      color: var(--text);
      text-align: center;
      line-height: 1.3;
      margin-bottom: 0.6rem;
      letter-spacing: 0.01em;
    }

    .subline {
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      font-size: 0.88rem;
      color: var(--text-dim);
      text-align: center;
      margin-bottom: 3rem;
    }

    /* ── search container ── */
    .search-wrap {
      position: relative;
      width: 100%;
      max-width: 440px;
    }

    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 1rem 1.2rem;
      color: var(--text);
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      font-size: 1.05rem;
      letter-spacing: 0.02em;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      caret-color: var(--amber);
    }

    .search-input::placeholder {
      color: var(--text-dim);
      font-style: italic;
    }

    .search-input:focus {
      border-color: var(--amber-dim);
      box-shadow: 0 0 0 3px var(--amber-glow);
    }

    /* ── dropdown ── */
    .dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #16130f;
      border: 1px solid var(--border);
      border-radius: 2px;
      max-height: 280px;
      overflow-y: auto;
      z-index: 100;
      display: none;
      scrollbar-width: thin;
      scrollbar-color: var(--amber-dim) transparent;
    }

    .dropdown.open { display: block; }

    .dropdown-item {
      padding: 0.75rem 1.2rem;
      cursor: pointer;
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      font-size: 0.95rem;
      color: var(--text-dim);
      border-bottom: 1px solid #1e1a16;
      transition: background 0.12s, color 0.12s;
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
    }

    .dropdown-item:last-child { border-bottom: none; }

    .dropdown-item:hover,
    .dropdown-item.active {
      background: #1e1a14;
      color: var(--text);
    }

    /* gufa & Film Dealer items get amber accent */
    .dropdown-item.gufa-item {
      color: var(--amber-dim);
    }
    .dropdown-item.gufa-item:hover,
    .dropdown-item.gufa-item.active {
      color: var(--amber);
      background: #1e1a10;
    }

    .film-name { flex: 1; }

    .match-highlight {
      color: var(--amber);
      font-style: italic;
    }

    .no-results {
      padding: 0.85rem 1.2rem;
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      font-size: 0.88rem;
      color: var(--text-dim);
    }

    .dropdown-item.fallback-item {
      border-top: 1px solid #2a2420;
      color: var(--text-dim);
      font-size: 0.85rem;
      opacity: 0.7;
    }

    .dropdown-item.fallback-item:hover,
    .dropdown-item.fallback-item.active {
      opacity: 1;
      color: var(--text);
      background: #1a1612;
    }

    /* ── selected badge ── */
    .selected-badge {
      margin-top: 1rem;
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      font-size: 0.85rem;
      color: var(--amber-dim);
      text-align: center;
      min-height: 1.4rem;
      transition: opacity 0.2s;
      opacity: 0;
    }

    .selected-badge.visible {
      opacity: 1;
    }

    /* ── continue button ── */
    .continue-btn {
      margin-top: 2.4rem;
      padding: 0.85rem 2.8rem;
      background: transparent;
      border: 1px solid var(--amber-dim);
      color: var(--amber);
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      font-size: 1rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.2s, box-shadow 0.2s, color 0.2s, opacity 0.3s;
      opacity: 0;
      pointer-events: none;
    }

    .continue-btn.ready {
      opacity: 1;
      pointer-events: all;
    }

    .continue-btn.ready:hover {
      background: var(--amber-glow);
      box-shadow: 0 0 18px var(--amber-glow);
      color: #e8c870;
    }

    /* ── footer mark ── */
    .mark {
      position: fixed;
      bottom: 1.8rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      color: var(--text-dim);
      opacity: 0.35;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div class="stage">

  <h1 class="headline">Which film are you bringing in?</h1>
  <p class="subline">Start typing — the name, the make, anything.</p>

<p class="mark">gufa.Labs · यहाँ प्रकाश जन्म लेता है</p>

    // LAZY

    // ZHENWEI
    { m: 'Zhenwei',      f: 'Kepler 100' },

    { m: 'Disposable Kodak',    f: 'FunSaver 800' },

    { m: 'Disposable AGFAPhoto', f: 'LeBox B&W' },
    // gufa ─ amber treatment, display name is the full thing as-is
    { m: 'gufa',         f: 'Essence 250',          gufa: true },
    { m: 'gufa',         f: "Roasty Toasty 400",    gufa: true },
    { m: 'gufa',         f: 'Cine Color 250',        gufa: true },

    const isGufa = entry.gufa === true;

    const isFilmDealer = entry.m === 'Film Dealer';

    let display;
    if (isGufaOwn) {
      display = `gufa's ${entry.f}`;
    } else if (isFilmDealer) {
      display = `${entry.f} (Film Dealer)`;
    } else {
      display = `${entry.f} (${entry.m})`;
    }

    return {
      display,
      search: `${entry.m} ${entry.f}`.toLowerCase(),
      isGufa,
    };
  });

  // ── special fallback entry — always appended at end of results ──
  const FALLBACK = {
    display: 'not on the list?',
    search: 'not on the list',
    isGufa: false,
    isFallback: true,
  };

  // ── DOM ──────────────────────────────────────────────────────
  const input       = document.getElementById('filmSearch');
  const dropdown    = document.getElementById('dropdown');
  const badge       = document.getElementById('selectedBadge');
  const continueBtn = document.getElementById('continueBtn');

  let selectedFilm  = null;
  let activeIndex   = -1;
  let currentItems  = [];

  const TALLY_URL = 'https://tally.so/r/rjWNDv';

  // ─────────────────────────────────────────────────────────────
  // !! HOSTING TODO !!
  // When live, update @wayahead in Tally devScan form to:
  //   https://gufalabs.github.io/gufa-dev-form/film-nanny-log.html
  // The redirect on completion line stays: @wayahead?order value=@mcart
  // Also ensure Tally passes snum: @wayahead?order value=@mcart&snum=@snum
  // ─────────────────────────────────────────────────────────────

  // Read incoming params from URL
  const urlParams    = new URLSearchParams(window.location.search);
  const orderValue   = urlParams.get('order value'); // e.g. "1500" — present on Film 2, 3, 4...
  const snum         = urlParams.get('snum') || '';  // phone number — carried throughout

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function highlight(text, query) {
    if (!query) return escapeHtml(text);
    const idx = text.toLowerCase().indexOf(query.toLowerCase());
    if (idx === -1) return escapeHtml(text);
    return (
      escapeHtml(text.slice(0, idx)) +
      `<span class="match-highlight">${escapeHtml(text.slice(idx, idx + query.length))}</span>` +
      escapeHtml(text.slice(idx + query.length))
    );
  }

  function openDropdown(query) {
    const q = query.trim().toLowerCase();
    if (!q) { closeDropdown(); return; }

    currentItems = [...FILMS.filter(f => f.search.includes(q)), FALLBACK];
    dropdown.innerHTML = '';
    activeIndex = -1;

    currentItems.forEach((film, i) => {
      const div = document.createElement('div');
      div.className = 'dropdown-item' + (film.isGufa ? ' gufa-item' : '') + (film.isFallback ? ' fallback-item' : '');
      div.innerHTML = `<span class="film-name">${film.isFallback ? film.display : highlight(film.display, query.trim())}</span>`;
      div.addEventListener('mousedown', e => {
        e.preventDefault();
        selectFilm(film);
      });
      dropdown.appendChild(div);
    });

    dropdown.classList.add('open');
  }

  function closeDropdown() {
    dropdown.classList.remove('open');
    dropdown.innerHTML = '';
    currentItems = [];
    activeIndex = -1;
  }

  function selectFilm(film) {
    selectedFilm = film;
    input.value = film.display;
    closeDropdown();
    badge.textContent = '✦ ' + film.display + ' — selected';
    badge.classList.add('visible');
    continueBtn.classList.add('ready');
  }

  function clearSelection() {
    selectedFilm = null;
    badge.classList.remove('visible');
    continueBtn.classList.remove('ready');
  }

  // keyboard nav
  input.addEventListener('keydown', e => {
    if (!dropdown.classList.contains('open')) return;
    const items = dropdown.querySelectorAll('.dropdown-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      activeIndex = Math.min(activeIndex + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('active', i === activeIndex));
      if (items[activeIndex]) items[activeIndex].scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      activeIndex = Math.max(activeIndex - 1, 0);
      items.forEach((el, i) => el.classList.toggle('active', i === activeIndex));
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (activeIndex >= 0 && currentItems[activeIndex]) {
        selectFilm(currentItems[activeIndex]);
      }
    } else if (e.key === 'Escape') {
      closeDropdown();
    }
  });

  input.addEventListener('input', () => {
    clearSelection();
    openDropdown(input.value);
  });

  input.addEventListener('focus', () => {
    if (input.value && !selectedFilm) openDropdown(input.value);
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) closeDropdown();
  });

  continueBtn.addEventListener('click', () => {
    if (!selectedFilm) return;
    const params = new URLSearchParams({ film: selectedFilm.display });
    if (orderValue) params.set('order value', orderValue);
    if (snum)       params.set('snum', snum);
    window.location.href = `${TALLY_URL}?${params.toString()}`;
  });
</script>
</body>
</html>
