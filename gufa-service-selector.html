<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>gufa.Labs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@300;400&family=IM+Fell+English:ital@0,1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0908;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gufa-wrap {
      min-height: 600px;
      width: 100%;
      max-width: 560px;
      background: #0a0908;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      padding: 4rem 2rem;
    }

    .grain {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      opacity: 0.35;
      pointer-events: none;
    }

    .cave-glow {
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(180,140,80,0.08) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      pointer-events: none;
    }

    .gufa-wordmark {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 20px;
      letter-spacing: 0.3em;
      color: #6b5a3e;
      margin-bottom: 2.5rem;
      position: relative;
    }

    .gufa-question {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 17px;
      color: #c8a96e;
      letter-spacing: 0.04em;
      margin-bottom: 3rem;
      text-align: center;
      text-shadow: 0 0 24px rgba(200,169,110,0.4), 0 0 50px rgba(180,140,80,0.15);
      position: relative;
      line-height: 1.6;
      max-width: 320px;
    }

    .gufa-buttons {
      display: flex;
      flex-direction: column;
      gap: 0;
      width: 100%;
      max-width: 340px;
      position: relative;
    }

    .gufa-btn {
      background: transparent;
      border: 0.5px solid #3a3020;
      color: #8a7355;
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 16px;
      letter-spacing: 0.05em;
      padding: 1.2rem 1.5rem;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: block;
      line-height: 1.4;
      transition: border-color 0.35s, color 0.35s, background 0.35s;
    }

    .gufa-btn + .gufa-btn {
      border-top: none;
    }

    .gufa-btn:hover {
      border-color: #8a7355;
      color: #c8a96e;
      background: rgba(180,140,80,0.04);
    }

    .btn-eyebrow {
      font-family: 'IM Fell English', serif;
      font-style: normal;
      font-size: 9px;
      letter-spacing: 0.35em;
      color: #2e2718;
      text-transform: uppercase;
      display: block;
      margin-bottom: 0.4rem;
      transition: color 0.35s;
    }

    .gufa-btn:hover .btn-eyebrow {
      color: #6b5a3e;
    }

    .gufa-sep {
      width: 0.5px;
      height: 20px;
      background: #2a2018;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="gufa-wrap">
    <div class="grain"></div>
    <div class="cave-glow"></div>

    <div class="gufa-wordmark">gufa.Labs</div>
    <div class="gufa-question" id="gufaQuestion"></div>

    <div class="gufa-buttons">
      <a class="gufa-btn" href="https://tally.so/r/rjWNDv">
        <span class="btn-eyebrow">develop</span>
        I want to process my film!
      </a>
      <div class="gufa-sep"></div>
      <a class="gufa-btn" href="https://tally.so/r/44jv65">
        <span class="btn-eyebrow">scan only</span>
        I only need to scan my negatives.
      </a>
    </div>
  </div>

  <script>
    const lines = [
      "How shall gufa enrich you today, {name}?",
      "Hey {name}, what would you like to do at gufa today?",
      "Hey {name}, what can gufa do for you today?",
      "In the many adventures of {name}, what wish has brought him to gufa today?",
      "gufa remembers you, {name} — what brings you back today?",
      "The darkroom is ready, {name} — what are we bringing to light today?",
      "{name}, the chemicals are warm — what are we developing today?",
      "Every roll has a story, {name}, and a name — what's next?"
    ];

    const params = new URLSearchParams(window.location.search);
    const name = params.get('name') || 'explorer';
    const picked = lines[Math.floor(Math.random() * lines.length)];
    document.getElementById('gufaQuestion').textContent = picked.replace(/{name}/g, name);
  </script>
</body>
</html>
