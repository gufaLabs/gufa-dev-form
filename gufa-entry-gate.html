
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@300;400&family=IM+Fell+English:ital@1&display=swap');

  .gufa-wrap {
    min-height: 600px;
    background: #0a0908;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    border-radius: 12px;
    padding: 4rem 2rem;
  }

  .grain {
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
    opacity: 0.35;
    pointer-events: none;
  }

  .cave-glow {
    position: absolute;
    width: 320px;
    height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(180,140,80,0.08) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    pointer-events: none;
  }

  .gufa-wordmark {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 20px;
    letter-spacing: 0.3em;
    color: #6b5a3e;
    margin-bottom: 3rem;
    position: relative;
  }

  .gufa-devanagari {
    font-family: 'Noto Serif Devanagari', serif;
    font-weight: 400;
    font-size: 22px;
    color: #c8a96e;
    letter-spacing: 0.08em;
    margin-bottom: 2.5rem;
    text-align: center;
    text-shadow: 0 0 24px rgba(200,169,110,0.5), 0 0 50px rgba(180,140,80,0.2);
    position: relative;
  }

  .gufa-prompt {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 15px;
    color: #3d3222;
    margin-bottom: 2.5rem;
    text-align: center;
    white-space: nowrap;
    position: relative;
  }

  .gufa-input-wrap { position: relative; width: 300px; }

  .gufa-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 0.5px solid #3a3020;
    color: #c8a96e;
    font-family: 'IM Fell English', serif;
    font-size: 26px;
    letter-spacing: 0.2em;
    padding: 10px 0;
    text-align: center;
    outline: none;
    caret-color: #8a7355;
    box-sizing: border-box;
    transition: border-color 0.4s;
  }

  .gufa-input::placeholder { color: #2e2718; letter-spacing: 0.25em; font-size: 20px; }
  .gufa-input:focus { border-bottom-color: #8a7355; }

  .loading-screen { display: none; flex-direction: column; align-items: center; gap: 1.4rem; }
  .loading-screen.active { display: flex; }
  .content-screen { display: flex; flex-direction: column; align-items: center; }
  .content-screen.hidden { display: none; }

  .film-frame {
    width: 36px;
    height: 52px;
    border: 1px solid #4a3f2f;
    position: relative;
    animation: flicker 0.12s steps(1) infinite;
  }

  .film-frame::before, .film-frame::after {
    content: '';
    position: absolute;
    left: -7px;
    width: 6px;
    background: #2a2018;
    border-left: 1px solid #3a3020;
    border-right: 1px solid #3a3020;
  }

  .film-frame::before { top: 4px; height: 8px; }
  .film-frame::after { bottom: 4px; height: 8px; }

  .film-inner {
    position: absolute;
    inset: 5px;
    background: #1a1408;
    animation: flicker-inner 0.18s steps(1) infinite;
  }

  @keyframes flicker { 0%, 100% { border-color: #4a3f2f; } 50% { border-color: #6b5a3e; } }
  @keyframes flicker-inner {
    0%, 80% { background: #1a1408; }
    85% { background: #2a2010; }
    90% { background: #0a0906; }
    100% { background: #1a1408; }
  }

  .loading-hindi {
    font-family: 'Noto Serif Devanagari', serif;
    font-size: 17px;
    color: #6b5a3e;
    letter-spacing: 0.08em;
    text-align: center;
    animation: pulse-text 1.8s ease-in-out infinite;
  }

  .loading-english {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 14px;
    color: #3d3222;
    letter-spacing: 0.1em;
    text-align: center;
    animation: pulse-text 1.8s ease-in-out infinite;
    animation-delay: 0.2s;
  }

  @keyframes pulse-text { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

  .dots span { animation: blink 1.2s steps(1) infinite; color: #8a7355; }
  .dots span:nth-child(2) { animation-delay: 0.4s; }
  .dots span:nth-child(3) { animation-delay: 0.8s; }
  @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
</style>

<div class="gufa-wrap">
  <div class="grain"></div>
  <div class="cave-glow"></div>

  <div class="content-screen" id="contentScreen">
    <div class="gufa-wordmark">gufa.Labs</div>
    <div class="gufa-devanagari">यहाँ प्रकाश जन्म लेता है</div>
    <div class="gufa-prompt">enter your number to step inside</div>
    <div class="gufa-input-wrap">
      <input class="gufa-input" id="phoneInput" type="tel" placeholder="· · · · · · · · · ·" maxlength="10" />
    </div>
  </div>

  <div class="loading-screen" id="loadingScreen">
    <div class="film-frame"><div class="film-inner"></div></div>
    <div class="loading-hindi">गुफा जाग रही है<span class="dots"><span>.</span><span>.</span><span>.</span></span> आपका रास्ता ढूंढा जा रहा है<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
    <div class="loading-english">the cave is waking... your path is being found...</div>
  </div>
</div>

<script>
  const input = document.getElementById('phoneInput');
  const content = document.getElementById('contentScreen');
  const loading = document.getElementById('loadingScreen');

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && this.value.length >= 10) {
      content.classList.add('hidden');
      loading.classList.add('active');
    }
  });
</script>
